<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[과제]Project 구성과 index.html 생성</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
</head>
<body>
    <h1 class="text-3xl font-bold underline">환영 인사</h1>
    <p>스칼라에 오신 것을 환영합니다.</p>
    <script>
      var computerNum = Math.floor(Math.random () * 50) + 1;
      console.log(computerNum);

      const num = Number(prompt("숫자를 입력하세요."));
      if (num > computerNum) {
          alert("Up");
      } else if (num < computerNum) {
          alert("Down");
      } else {
          alert("정답입니다!");
      }
    </script>
</body>
</html>
